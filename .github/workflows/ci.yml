name: CI

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        python:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Use canonical temporary directory on macOS
        if: runner.os == 'macOS'
        # macOS exposes /var as a system symlink. Keep tempfile output under
        # the runner directory without weakening portable-path checks.
        run: echo "TMPDIR=$RUNNER_TEMP" >> "$GITHUB_ENV"

      - name: Install FFmpeg on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Install FFmpeg with libsoxr on macOS
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew uninstall --ignore-dependencies ffmpeg || true
          brew tap homebrew-ffmpeg/ffmpeg
          git -C "$(brew --repo homebrew-ffmpeg/ffmpeg)" checkout --detach c771da5a0a6bd5ddde6c07cb014570f872e851da
          brew install homebrew-ffmpeg/ffmpeg/ffmpeg --with-libsoxr

      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ffmpeg-full --version=8.1.2 --yes --no-progress

      - name: Verify external tools
        run: |
          ffmpeg -version
          ffprobe -version
          node --version
          ffmpeg -nostdin -hide_banner -loglevel error -f lavfi -i "anullsrc=r=48000:cl=stereo" -t 0.02 -af "aresample=44100:resampler=soxr:precision=33:cutoff=0.99" -f null -

      - name: Sync frozen development environment
        run: uv sync --frozen --group dev

      - name: Run synthetic FFmpeg integration
        run: uv run --frozen --group dev python -m pytest -q tests/test_integration.py

      - name: Run complete test suite
        run: uv run --frozen --group dev python -m pytest -q

      - name: Run strict typing, Flake8, Ruff, and Node syntax checks
        run: uv run --frozen --group dev python scripts/check_quality.py

      - name: Compile Python source
        run: uv run --frozen --group dev python -m compileall -q src tests scripts

  browser-e2e:
    name: Browser E2E / ${{ matrix.engine }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        engine:
          - chromium
          - firefox
          - webkit
          - mobile-chromium

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Install frozen Python and browser test dependencies
        run: |
          uv sync --frozen --group dev
          npm ci

      - name: Install exact Playwright engine
        run: npx playwright install --with-deps ${{ matrix.engine == 'mobile-chromium' && 'chromium' || matrix.engine }}

      - name: Run checked-in browser and accessibility acceptance
        run: npx playwright test --project=${{ matrix.engine }}

      - name: Upload browser evidence on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: browser-e2e-${{ matrix.engine }}
          path: |
            .groove-serpent/browser-test-results/
            .groove-serpent/browser-report/
          if-no-files-found: warn
          retention-days: 14

  package:
    name: Build and audit distributions
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Build wheel and source distribution
        run: python scripts/build_python_distributions.py

      - name: Check distribution metadata
        run: uvx --from twine==6.2.0 twine check --strict dist/*.whl dist/*.tar.gz

      - name: Audit package contents for private material
        shell: python {0}
        run: |
          from __future__ import annotations

          import pathlib
          import re
          import tarfile
          import zipfile

          forbidden_endings = (
              ".aif",
              ".aiff",
              ".album.json",
              ".click-scan.json",
              ".flac",
              ".groove.json",
              ".m4a",
              ".mp3",
              ".restoration-recipe.json",
              ".wav",
          )
          private_patterns = (
              re.compile(rb"[A-Za-z]:(?:/+|\\+)Users(?:/+|\\+)[^\\/\r\n]+", re.IGNORECASE),
              re.compile(rb"[A-Za-z]:(?:/+|\\+)HomelabForge(?:/+|\\+)", re.IGNORECASE),
              re.compile(rb"-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----"),
              re.compile(rb"sk-" rb"proj-[A-Za-z0-9_-]+"),
          )

          archives = sorted(
              path
              for path in pathlib.Path("dist").glob("*")
              if path.suffix == ".whl" or path.name.endswith(".tar.gz")
          )
          assert archives, "No distributions were built."
          for archive in archives:
              payloads: dict[str, bytes] = {}
              if archive.suffix == ".whl":
                  with zipfile.ZipFile(archive) as package:
                      payloads = {
                          info.filename: package.read(info)
                          for info in package.infolist()
                          if not info.is_dir()
                      }
              elif archive.name.endswith(".tar.gz"):
                  with tarfile.open(archive, "r:gz") as package:
                      links = [member.name for member in package if member.issym() or member.islnk()]
                      assert not links, f"Linked package members are forbidden: {links}"
                      for member in package.getmembers():
                          if member.isfile():
                              handle = package.extractfile(member)
                              assert handle is not None
                              payloads[member.name] = handle.read()
              else:
                  continue

              assert payloads, f"No regular files found in {archive}"
              for name, data in payloads.items():
                  path = pathlib.PurePosixPath(name)
                  assert not path.is_absolute() and ".." not in path.parts, (
                      f"Unsafe package member: {name}"
                  )
                  lowered = name.casefold()
                  assert not lowered.endswith(forbidden_endings), (
                      f"Private media/project artifact packaged: {name}"
                  )
                  for pattern in private_patterns:
                      assert pattern.search(data) is None, (
                          f"Private or secret material matched in {archive.name}:{name}"
                      )

          print(f"Audited {len(archives)} distributions without private-content matches.")

      - name: Install and smoke-test the wheel in a clean environment
        shell: python {0}
        run: |
          from __future__ import annotations

          import os
          import pathlib
          import subprocess
          import sys

          wheels = list(pathlib.Path("dist").glob("*.whl"))
          assert len(wheels) == 1, wheels
          environment = pathlib.Path(os.environ["RUNNER_TEMP"]) / "groove-serpent-wheel-smoke"
          subprocess.run(
              ["uv", "venv", str(environment), "--python", sys.executable],
              check=True,
          )
          python = environment / ("Scripts/python.exe" if os.name == "nt" else "bin/python")
          subprocess.run(
              ["uv", "pip", "install", "--python", str(python), str(wheels[0])],
              check=True,
          )
          subprocess.run([str(python), "-m", "groove_serpent", "--version"], check=True)
          subprocess.run([str(python), "-m", "groove_serpent", "doctor"], check=True)
          subprocess.run(
              [
                  str(python),
                  "-c",
                  (
                      "from importlib.resources import files; "
                      "root=files('groove_serpent').joinpath('web'); "
                      "assert all(root.joinpath(n).is_file() for n in "
                      "('index.html','app.js','styles.css'))"
                  ),
              ],
              check=True,
          )

      - name: Reconcile final distributions against the build receipt
        shell: python {0}
        run: |
          from __future__ import annotations

          import hashlib
          import json
          import pathlib

          root = pathlib.Path("dist")
          receipt_name = "PYTHON_DISTRIBUTIONS_RECEIPT.json"
          wheel_name = "groove_serpent-1.0.0-py3-none-any.whl"
          sdist_name = "groove_serpent-1.0.0.tar.gz"
          expected_names = {receipt_name, wheel_name, sdist_name}
          entries = list(root.iterdir())
          observed_names = {entry.name for entry in entries}
          if observed_names != expected_names or any(
              entry.is_symlink() or not entry.is_file() for entry in entries
          ):
              raise SystemExit(f"Unexpected final distribution inventory: {observed_names}")

          receipt_bytes = (root / receipt_name).read_bytes()
          receipt = json.loads(receipt_bytes.decode("utf-8", errors="strict"))
          if (
              receipt.get("schema")
              != "groove-serpent/python-distribution-build-receipt/1"
              or receipt.get("result") != "passed"
              or receipt.get("project")
              != {"name": "groove-serpent", "version": "1.0.0"}
          ):
              raise SystemExit("Final distribution receipt authority is invalid.")
          outputs = receipt.get("outputs")
          if not isinstance(outputs, list) or len(outputs) != 2:
              raise SystemExit("Final distribution receipt output inventory is invalid.")
          by_role = {
              item.get("role"): item for item in outputs if isinstance(item, dict)
          }
          expected_roles = {"wheel": wheel_name, "sdist": sdist_name}
          if set(by_role) != set(expected_roles):
              raise SystemExit("Final distribution receipt roles are invalid.")
          for role, filename in expected_roles.items():
              item = by_role[role]
              payload = (root / filename).read_bytes()
              if (
                  item.get("filename") != filename
                  or item.get("bytes") != len(payload)
                  or item.get("sha256") != hashlib.sha256(payload).hexdigest()
              ):
                  raise SystemExit(f"Final {role} does not match its build receipt.")
          print("Final Python distributions exactly match the passed build receipt.")

      - name: Upload audited Python distributions and receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-distributions-${{ runner.os }}-${{ github.sha }}
          path: |
            dist/groove_serpent-1.0.0-py3-none-any.whl
            dist/groove_serpent-1.0.0.tar.gz
            dist/PYTHON_DISTRIBUTIONS_RECEIPT.json
          if-no-files-found: error
          retention-days: 7

  source-archive:
    name: Deterministic source ZIP / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Build normalized source archive
        run: python scripts/build_public_archive.py

      - name: Verify source archive commit marker
        run: python scripts/build_public_archive.py --verify

      - name: Upload archive, manifest, and commit marker
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: source-archive-${{ runner.os }}
          path: |
            dist/groove-serpent-1.0.0-source.zip
            dist/SOURCE_MANIFEST.sha256
            dist/groove-serpent-1.0.0-source.commit.json
          if-no-files-found: error
          retention-days: 7

  compare-source-archives:
    name: Compare cross-platform source ZIPs
    needs: source-archive
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Download source archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: source-archive-*
          path: ${{ runner.temp }}/source-comparison

      - name: Verify every downloaded commit marker
        shell: bash
        run: |
          set -euo pipefail
          for directory in "$RUNNER_TEMP"/source-comparison/source-archive-*; do
            python scripts/build_public_archive.py --verify \
              --archive "$directory/groove-serpent-1.0.0-source.zip" \
              --manifest "$directory/SOURCE_MANIFEST.sha256" \
              --marker "$directory/groove-serpent-1.0.0-source.commit.json"
          done

      - name: Require byte-identical archives, manifests, and markers
        shell: python {0}
        run: |
          import hashlib
          import os
          import pathlib

          names = (
              "groove-serpent-1.0.0-source.zip",
              "SOURCE_MANIFEST.sha256",
              "groove-serpent-1.0.0-source.commit.json",
          )
          root = pathlib.Path(os.environ["RUNNER_TEMP"]) / "source-comparison"
          for name in names:
              paths = sorted(root.rglob(name))
              assert len(paths) == 2, paths
              receipts = {
                  str(path): hashlib.sha256(path.read_bytes()).hexdigest()
                  for path in paths
              }
              for path, digest in receipts.items():
                  print(f"{digest}  {path}")
              assert len(set(receipts.values())) == 1, receipts
